name: aura_app
description: Plataforma AURA de acompanhamento psiquiátrico ambulatorial.

publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Autenticação e Banco de Dados
  # supabase_flutter já inclui supabase como dependência interna
  supabase_flutter: ^2.3.0

  # Notificações (Firebase removido temporariamente — será adicionado na Fase 2)
  # firebase_messaging: ^14.7.0
  # firebase_core: ^2.24.0

  # Offline-first
  sqflite: ^2.3.0
  path: ^1.9.0

  # HTTP
  http: ^1.2.0
  dio: ^5.4.0

  # State Management
  provider: ^6.1.0

  # UI
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  fl_chart: ^0.66.0

  # Utilitários
  uuid: ^4.3.0
  shared_preferences: ^2.2.0
  device_info_plus: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
